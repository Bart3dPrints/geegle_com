<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unity WebGL Game</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #unity-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #unity-canvas {
      width: 100%;
      height: 100%;
      background: #000;
    }
    #loading-cover {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    #loading-bar {
      width: 300px;
      height: 20px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 20px;
    }
    #loading-fill {
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #8BC34A);
      width: 0%;
      transition: width 0.3s;
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>
  </div>
  <div id="loading-cover">
    <h2>Loading Game...</h2>
    <div id="loading-bar">
      <div id="loading-fill"></div>
    </div>
    <p id="loading-text">0%</p>
  </div>

  <script>
    // CONFIGURATION - Update these paths for each game
    const config = {
      dataUrl: "./Build/GAME_NAME.data",
      frameworkUrl: "./Build/GAME_NAME.framework.js",
      codeUrl: "./Build/GAME_NAME.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "GAME_NAME",
      productVersion: "1.0",
    };

    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingCover = document.querySelector("#loading-cover");
    const loadingFill = document.querySelector("#loading-fill");
    const loadingText = document.querySelector("#loading-text");

    // Create Unity instance
    if (typeof createUnityInstance !== 'undefined') {
      createUnityInstance(canvas, config, (progress) => {
        const percentage = Math.round(progress * 100);
        loadingFill.style.width = percentage + "%";
        loadingText.textContent = percentage + "%";
      }).then((unityInstance) => {
        loadingCover.classList.add("hidden");
        canvas.focus();
      }).catch((message) => {
        loadingText.textContent = "Error loading game: " + message;
        console.error(message);
      });
    } else {
      // Fallback: Try to load the Unity loader script
      const loaderScript = document.createElement('script');
      loaderScript.src = './Build/GAME_NAME.loader.js';
      loaderScript.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          const percentage = Math.round(progress * 100);
          loadingFill.style.width = percentage + "%";
          loadingText.textContent = percentage + "%";
        }).then((unityInstance) => {
          loadingCover.classList.add("hidden");
          canvas.focus();
        }).catch((message) => {
          loadingText.textContent = "Error: " + message;
          console.error(message);
        });
      };
      loaderScript.onerror = () => {
        loadingText.textContent = "Error: Could not load Unity loader script";
      };
      document.body.appendChild(loaderScript);
    }
  </script>
</body>
</html>
